# Dev: services isolated on internal network. Only frontend + BFF exposed to host.
# auth-service and backend have NO host ports — only reachable from BFF internally.
#
# Inter-service TCP (auth-service:4003, backend:4004) is wrapped in mTLS when
# TLS_ENABLED=true. Certs must exist at ./secrets/internal-ca/ — run
# `./scripts/gen-certs.sh` once before first `./dev.sh`.

networks:
  app-internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks: [app-internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks: [app-internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: src/auth-service/Dockerfile.dev
    volumes:
      - ./src/auth-service/src:/app/src/auth-service/src:ro
      - ./src/packages/contracts/src:/app/src/packages/contracts/src:ro
      - ./secrets/internal-ca:/certs:ro
    environment:
      PORT: 3003
      TCP_PORT: 4003
      TCP_BIND: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ADMIN_SECRET: dev-admin-secret-min-32-characters-ok
      JWT_CUSTOMER_SECRET: dev-customer-secret-min-32-chars-ok
      JWT_ACCESS_TOKEN_EXPIRATION: 15m
      JWT_REFRESH_TOKEN_EXPIRATION: 24h
      SESSION_MAX_DURATION_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:3007
      ALLOW_PASSWORD_ONLY_ADMIN_LOGIN: 'false'
      SYSTEM_KEY: dev-internal-system-key-min-32-chars-ok
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@local
      TLS_ENABLED: 'true'
      TLS_CA_PATH: /certs/ca.crt
      TLS_CERT_PATH: /certs/auth-service.crt
      TLS_KEY_PATH: /certs/auth-service.key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-internal]
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile.dev
    volumes:
      - ./src/backend/src:/app/src/backend/src:ro
      - ./src/packages/contracts/src:/app/src/packages/contracts/src:ro
      - ./secrets/internal-ca:/certs:ro
      - attachments:/data/attachments
    environment:
      PORT: 3004
      TCP_PORT: 4004
      TCP_BIND: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      AUTH_TCP_HOST: auth-service
      AUTH_TCP_PORT: 4003
      SYSTEM_KEY: dev-internal-system-key-min-32-chars-ok
      ALLOWED_ORIGINS: http://localhost:3006,http://localhost:3007
      LOG_LEVEL: info
      ATTACHMENTS_DIR: /data/attachments
      MESSAGE_RETENTION_DAYS: 30
      ATTACHMENT_RETENTION_DAYS: 30
      AUDIT_LOG_RETENTION_DAYS: 30
      ABUSE_REPORT_RETENTION_DAYS: 30
      # Demo + E2E speed: presence flips to AFK after 5s instead of the
      # default 60s. Production deploys override this to ~60s; the dev
      # stack runs faster so two-browser presence specs aren't timeout-bound.
      AFK_THRESHOLD_SECONDS: 5
      TLS_ENABLED: 'true'
      TLS_CA_PATH: /certs/ca.crt
      TLS_CERT_PATH: /certs/backend.crt
      TLS_KEY_PATH: /certs/backend.key
      WORKERS_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks: [app-internal]
    restart: unless-stopped

  backend-worker:
    build:
      context: .
      dockerfile: src/backend/Dockerfile.dev
    command: ['yarn', 'dev:worker']
    volumes:
      - ./src/backend/src:/app/src/backend/src:ro
      - ./src/packages/contracts/src:/app/src/packages/contracts/src:ro
      - ./secrets/internal-ca:/certs:ro
      - attachments:/data/attachments
    environment:
      PORT: 3004
      TCP_PORT: 4004
      TCP_BIND: 0.0.0.0
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_TCP_HOST: auth-service
      AUTH_TCP_PORT: 4003
      SYSTEM_KEY: dev-internal-system-key-min-32-chars-ok
      ALLOWED_ORIGINS: http://localhost:3006,http://localhost:3007
      LOG_LEVEL: info
      ATTACHMENTS_DIR: /data/attachments
      MESSAGE_RETENTION_DAYS: 30
      ATTACHMENT_RETENTION_DAYS: 30
      AUDIT_LOG_RETENTION_DAYS: 30
      ABUSE_REPORT_RETENTION_DAYS: 30
      TLS_ENABLED: 'true'
      TLS_CA_PATH: /certs/ca.crt
      TLS_CERT_PATH: /certs/backend.crt
      TLS_KEY_PATH: /certs/backend.key
      WORKERS_ENABLED: 'true'
    # Internal worker — no HTTP/TCP listener, no host port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks: [app-internal]
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: src/bff/Dockerfile.dev
    volumes:
      - ./src/bff/src:/app/src/bff/src:ro
      - ./src/packages/contracts/src:/app/src/packages/contracts/src:ro
      - ./secrets/internal-ca:/certs:ro
    environment:
      PORT: 3006
      NODE_ENV: development
      LOG_LEVEL: debug
      AUTH_TCP_HOST: auth-service
      AUTH_TCP_PORT: 4003
      BACKEND_TCP_HOST: backend
      BACKEND_TCP_PORT: 4004
      JWT_SECRET: dev-bff-jwt-secret-min-32-characters-ok
      SESSION_COOKIE_SECRET: dev-session-cookie-secret-min-32-chars
      COOKIE_SECRET: dev-cookie-secret-min-32-characters-long
      SESSION_COOKIE_TTL: 3600
      REFRESH_COOKIE_TTL: 172800
      ALLOWED_ORIGINS: http://localhost:3007
      ALLOWED_WS_ORIGINS: http://localhost:3007
      SYSTEM_KEY: dev-internal-system-key-min-32-chars-ok
      # Opt-out of Secure cookie ONLY because dev stack uses plain HTTP. Never set in staging/prod.
      COOKIE_SECURE_DISABLED: 'true'
      TLS_ENABLED: 'true'
      TLS_CA_PATH: /certs/ca.crt
      TLS_CERT_PATH: /certs/bff.crt
      TLS_KEY_PATH: /certs/bff.key
    ports:
      - '3006:3006'
    depends_on:
      - auth-service
      - backend
    networks: [app-internal]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile.dev
    volumes:
      - ./src/frontend/src:/app/src/frontend/src:ro
      - ./src/frontend/index.html:/app/src/frontend/index.html:ro
      - ./src/packages/contracts/src:/app/src/packages/contracts/src:ro
    environment:
      BFF_URL: http://bff:3006
    ports:
      - '3007:3007'
    depends_on:
      - bff
    networks: [app-internal]
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI (search, REST API, read-on-open)
    networks: [app-internal]
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    environment:
      DOZZLE_NO_ANALYTICS: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '9999:8080'
    networks: [app-internal]
    restart: unless-stopped

volumes:
  pgdata_dev:
  attachments:
