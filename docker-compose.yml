version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./src/auth-service
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./src/auth-service/.env
    restart: unless-stopped

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
      - '4004:4004'
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    env_file: ./src/backend/.env
    restart: unless-stopped

  bff:
    build:
      context: ./src/bff
      dockerfile: Dockerfile
    ports:
      - '3006:3006'
    depends_on:
      - auth-service
      - backend
    env_file: ./src/bff/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - '3007:3007'
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  pgdata:
