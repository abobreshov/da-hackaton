global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: hackathone-dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # NestJS app services — /metrics is wired via @willsoto/nestjs-prometheus,
  # exposing default Node + process metrics at the root path (the global
  # `api/v1` prefix excludes /metrics). Custom domain metrics will be added
  # later; for now scrape returns the default registry only.
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3004']
        labels:
          service: backend

  - job_name: bff
    metrics_path: /metrics
    static_configs:
      - targets: ['bff:3006']
        labels:
          service: bff

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:3003']
        labels:
          service: auth-service

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
